<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form Login</title>
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>

<div class="auth-card">
    <!-- Tabs -->
    <div class="auth-tabs">
        <button class="auth-tab active" id="tabLogin" onclick="showTab('login')">Login</button>
        <button class="auth-tab" id="tabRegister" onclick="showTab('register')">Register</button>
    </div>

    <!-- Login Form -->
    <form id="loginForm">
        <input type="text" id="username" placeholder="Username" required>
        <input type="password" id="password" placeholder="Password" required>
        <button type="submit" class="btnn" id="loginBtn">Login</button>
        <div id="loginMessage"></div>
    </form>

    <!-- Register Form -->
    <form id="registerForm" class="hidden">
        <input type="text" id="reg_fullname" placeholder="Full Name" required>
        <input type="text" id="reg_username" placeholder="Username" required>
        <input type="password" id="reg_password" placeholder="Password" required>
        <input type="password" id="reg_confirm" placeholder="Confirm Password" required>
        <select id="reg_role" required>
            <option value="" disabled selected>Select Role</option>
            <option value="Employee">Employee</option>
            <option value="HR">HR</option>
            <option value="Admin">Admin</option>
        </select>
        <button type="submit" class="btnn">Register</button>
        <div id="registerMessage"></div>
    </form>
</div>

<!-- Toast Containers -->
<div id="toastSuccess" class="toastSuccess"></div>
<div id="toastWarning" class="toastWarning"></div>
<div id="toastError" class="toastError"></div>

<script src="script.js"></script>
</body>
</html>
